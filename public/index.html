<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jenkins Simulator Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --blue:      #388bfd;
      --green:     #3fb950;
      --yellow:    #d29922;
      --red:       #f85149;
      --purple:    #bc8cff;
      --orange:    #f0883e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 16px; font-weight: 600; }
    .badge {
      background: var(--green);
      color: #000;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Layout ── */
    main { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

    /* ── Stat Cards ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .stat-card .number { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .stat-card .label  { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card.queued  .number { color: var(--yellow); }
    .stat-card.running .number { color: var(--blue); }
    .stat-card.success .number { color: var(--green); }
    .stat-card.failed  .number { color: var(--red); }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-header h2 { font-size: 14px; font-weight: 600; }

    .btn {
      background: var(--blue);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn.sm { padding: 4px 10px; font-size: 12px; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* ── Workers Grid ── */
    .workers-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .worker-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      transition: border-color 0.3s;
    }

    .worker-card.busy { border-color: var(--blue); }

    .worker-name { font-weight: 600; margin-bottom: 4px; font-size: 13px; }
    .worker-specialty { color: var(--purple); font-size: 11px; margin-bottom: 8px; }
    .worker-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }
    .worker-status.idle  { background: rgba(63,185,80,0.15); color: var(--green); }
    .worker-status.busy  { background: rgba(56,139,253,0.15); color: var(--blue); }
    .worker-job {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .worker-stats {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      font-size: 11px;
    }

    .worker-stats span:first-child { color: var(--green); }
    .worker-stats span:last-child  { color: var(--red); }

    /* ── Job Table ── */
    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface2);
      padding: 10px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    tbody tr {
      border-top: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 10px 14px; font-size: 13px; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-pill.queued  { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .status-pill.running { background: rgba(56,139,253,0.2);  color: var(--blue); }
    .status-pill.success { background: rgba(63,185,80,0.15);  color: var(--green); }
    .status-pill.failed  { background: rgba(248,81,73,0.15);  color: var(--red); }

    .lang-tag {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--purple);
      font-family: monospace;
    }

    /* ── Log Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 { font-size: 14px; font-weight: 600; }

    .close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
    }
    .close-btn:hover { color: var(--text); }

    .modal-body { padding: 16px 18px; overflow-y: auto; }
    pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
      color: #adbac7;
      line-height: 1.7;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .meta-item { background: var(--surface2); border-radius: 6px; padding: 8px 10px; }
    .meta-label { color: var(--muted); margin-bottom: 2px; }
    .meta-value { font-weight: 600; font-family: monospace; }

    /* ── Simulate Bar ── */
    .simulate-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .simulate-bar label { font-size: 13px; color: var(--muted); }
    .simulate-bar input, .simulate-bar select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 13px;
    }
    .simulate-bar input { width: 180px; }

    .empty-row td { text-align: center; color: var(--muted); padding: 30px; font-style: italic; }
  </style>
</head>
<body>

<header>
  <div class="live-dot"></div>
  <h1>Jenkins Simulator</h1>
  <span class="badge">LIVE</span>
  <span style="margin-left:auto;color:var(--muted);font-size:12px">Auto-refreshes every 2s</span>
</header>

<main>

  <!-- Stat Cards -->
  <div class="stats-row">
    <div class="stat-card queued"><div class="number" id="s-queued">0</div><div class="label">Queued</div></div>
    <div class="stat-card running"><div class="number" id="s-running">0</div><div class="label">Running</div></div>
    <div class="stat-card success"><div class="number" id="s-success">0</div><div class="label">Success</div></div>
    <div class="stat-card failed"><div class="number" id="s-failed">0</div><div class="label">Failed</div></div>
  </div>

  <!-- Workers -->
  <div class="section-header">
    <h2>Workers</h2>
  </div>
  <div class="workers-grid" id="workers-grid">
    <!-- populated by JS -->
  </div>

  <!-- Simulate Bar -->
  <div class="simulate-bar">
    <label>Trigger a job:</label>
    <input type="text" id="inp-repo" placeholder="Repo name (e.g. my-app)" value="web-frontend">
    <select id="inp-lang">
      <option value="python">Python</option>
      <option value="javascript" selected>JavaScript</option>
      <option value="java">Java</option>
      <option value="general">General</option>
    </select>
    <input type="text" id="inp-branch" placeholder="Branch" value="main" style="width:110px">
    <button class="btn" onclick="triggerWebhook()">⚡ Trigger webhook</button>
    <button class="btn btn-outline" onclick="triggerRandom()">🎲 Random job</button>
    <button class="btn btn-outline" onclick="triggerBurst()">💥 Burst (5 jobs)</button>
  </div>

  <!-- Job Table -->
  <div class="section-header">
    <h2>Job Queue</h2>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline sm" onclick="filterJobs('')">All</button>
      <button class="btn btn-outline sm" onclick="filterJobs('queued')">Queued</button>
      <button class="btn btn-outline sm" onclick="filterJobs('running')">Running</button>
      <button class="btn btn-outline sm" onclick="filterJobs('success')">Success</button>
      <button class="btn btn-outline sm" onclick="filterJobs('failed')">Failed</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Job ID</th>
          <th>Repo</th>
          <th>Branch</th>
          <th>Language</th>
          <th>Status</th>
          <th>Worker</th>
          <th>Duration</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody id="jobs-tbody">
        <tr class="empty-row"><td colspan="8">No jobs yet. Trigger one above!</td></tr>
      </tbody>
    </table>
  </div>

</main>

<!-- Log Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Job Details</h3>
      <button class="close-btn" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="meta-grid" id="modal-meta"></div>
      <pre id="modal-log">Loading...</pre>
    </div>
  </div>
</div>

<script>
  let currentFilter = '';
  let allJobs = [];

  // ── Helpers ──────────────────────────────────────────────
  function timeSince(dateStr) {
    if (!dateStr) return '—';
    const diff = Date.now() - new Date(dateStr).getTime();
    if (diff < 60000)  return Math.floor(diff/1000) + 's ago';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    return Math.floor(diff/3600000) + 'h ago';
  }

  function fmtDuration(ms) {
    if (!ms) return '—';
    return ms < 1000 ? ms + 'ms' : (ms/1000).toFixed(1) + 's';
  }

  function statusIcon(s) {
    return { queued: '⏳', running: '🔵', success: '✅', failed: '❌' }[s] || '?';
  }

  // ── Fetch & Render ───────────────────────────────────────
  async function fetchAll() {
    try {
      const [statsRes, workersRes, jobsRes] = await Promise.all([
        fetch('/stats'),
        fetch('/workers'),
        fetch('/jobs' + (currentFilter ? '?status=' + currentFilter : '')),
      ]);
      const stats   = await statsRes.json();
      const workers = await workersRes.json();
      const jobs    = await jobsRes.json();
      allJobs = jobs;
      renderStats(stats);
      renderWorkers(workers);
      renderJobs(jobs);
    } catch(e) {
      console.error('Fetch error:', e);
    }
  }

  function renderStats(s) {
    document.getElementById('s-queued').textContent  = s.queued;
    document.getElementById('s-running').textContent = s.running;
    document.getElementById('s-success').textContent = s.success;
    document.getElementById('s-failed').textContent  = s.failed;
  }

  function renderWorkers(workers) {
    const grid = document.getElementById('workers-grid');
    grid.innerHTML = workers.map(w => `
      <div class="worker-card ${w.status}">
        <div class="worker-name">${w.name}</div>
        <div class="worker-specialty">${w.specialty}</div>
        <span class="worker-status ${w.status}">
          ${w.status === 'busy' ? '🔵' : '🟢'} ${w.status}
        </span>
        ${w.current_job_id ? `<div class="worker-job">Job: ${w.current_job_id.slice(0,8)}…</div>` : ''}
        <div class="worker-stats">
          <span>✅ ${w.jobs_completed}</span>
          <span>❌ ${w.jobs_failed}</span>
        </div>
      </div>
    `).join('');
  }

  function renderJobs(jobs) {
    const tbody = document.getElementById('jobs-tbody');
    if (!jobs.length) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="8">No ${currentFilter} jobs found.</td></tr>`;
      return;
    }

    tbody.innerHTML = jobs.map(j => `
      <tr onclick="showJobDetail('${j.id}')">
        <td style="font-family:monospace;font-size:12px;color:var(--muted)">${j.id.slice(0,8)}…</td>
        <td><strong>${j.repo_name}</strong></td>
        <td style="font-family:monospace;font-size:12px">${j.branch}</td>
        <td><span class="lang-tag">${j.language}</span></td>
        <td><span class="status-pill ${j.status}">${statusIcon(j.status)} ${j.status}</span></td>
        <td style="font-size:12px;color:var(--muted)">${j.worker_id ? j.worker_id.replace('worker-', 'W') : '—'}</td>
        <td style="font-size:12px">${fmtDuration(j.duration_ms)}</td>
        <td style="font-size:12px;color:var(--muted)">${timeSince(j.created_at)}</td>
      </tr>
    `).join('');
  }

  // ── Filter ───────────────────────────────────────────────
  function filterJobs(status) {
    currentFilter = status;
    fetchAll();
  }

  // ── Triggers ─────────────────────────────────────────────
  async function triggerWebhook() {
    const repo   = document.getElementById('inp-repo').value   || 'my-app';
    const lang   = document.getElementById('inp-lang').value   || 'general';
    const branch = document.getElementById('inp-branch').value || 'main';

    await fetch('/webhook', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo, language: lang, branch, commit: Math.random().toString(16).slice(2,10) }),
    });
    fetchAll();
  }

  async function triggerRandom() {
    await fetch('/simulate', { method: 'POST' });
    fetchAll();
  }

  async function triggerBurst() {
    const promises = Array.from({ length: 5 }, () =>
      fetch('/simulate', { method: 'POST' })
    );
    await Promise.all(promises);
    fetchAll();
  }

  // ── Modal ────────────────────────────────────────────────
  async function showJobDetail(id) {
    document.getElementById('modal').classList.add('open');
    document.getElementById('modal-log').textContent = 'Loading…';

    const job = await fetch('/jobs/' + id).then(r => r.json());
    document.getElementById('modal-title').textContent = `Job: ${job.id.slice(0,8)}… — ${job.repo_name}`;

    document.getElementById('modal-meta').innerHTML = `
      <div class="meta-item"><div class="meta-label">Status</div><div class="meta-value">${statusIcon(job.status)} ${job.status}</div></div>
      <div class="meta-item"><div class="meta-label">Language</div><div class="meta-value">${job.language}</div></div>
      <div class="meta-item"><div class="meta-label">Branch</div><div class="meta-value">${job.branch}</div></div>
      <div class="meta-item"><div class="meta-label">Commit</div><div class="meta-value">${job.commit_hash}</div></div>
      <div class="meta-item"><div class="meta-label">Worker</div><div class="meta-value">${job.worker_id || '—'}</div></div>
      <div class="meta-item"><div class="meta-label">Duration</div><div class="meta-value">${fmtDuration(job.duration_ms)}</div></div>
    `;

    document.getElementById('modal-log').textContent =
      job.log || (job.status === 'queued' ? '⏳ Job is waiting in queue…' : '⏳ Job is running…');
  }

  function closeModal(e) {
    if (e.target.id === 'modal') closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('modal').classList.remove('open');
  }

  // ── Auto refresh ─────────────────────────────────────────
  fetchAll();
  setInterval(fetchAll, 2000);
</script>
</body>
</html>
